<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Admin Dashboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;600;700&display=swap" rel="stylesheet"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
<style>
:root{
  --bg:#07090e;--s1:#0c1018;--s2:#131924;--s3:#1a2232;--s4:#1f2a3c;
  --brd:#283450;--brd2:#1a2232;
  --acc:#ff6b35;--acc2:#ff8c5a;--acc-d:rgba(255,107,53,.12);
  --grn:#00d97e;--grn-d:rgba(0,217,126,.12);
  --blu:#4f9cff;--blu-d:rgba(79,156,255,.12);
  --red:#ff4766;--red-d:rgba(255,71,102,.12);
  --ylw:#ffcb47;--ylw-d:rgba(255,203,71,.12);
  --pur:#b06fff;--pur-d:rgba(176,111,255,.12);
  --txt:#dde4f5;--txt2:#7a8eb0;--txt3:#3d4f70;
  --font:'Be Vietnam Pro',sans-serif;--mono:'JetBrains Mono',monospace;
  --r:10px;--r2:16px;--sh:0 8px 32px rgba(0,0,0,.5);--sw:224px;
}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);color:var(--txt);font-family:var(--font);font-size:14px;height:100vh;display:flex;overflow:hidden}
button{font-family:var(--font);cursor:pointer;border:none;background:none;color:inherit}
input,select,textarea{font-family:var(--font);color:var(--txt)}
::-webkit-scrollbar{width:4px;height:4px}::-webkit-scrollbar-thumb{background:var(--brd);border-radius:4px}

/* AUTH */
#auth{position:fixed;inset:0;background:var(--bg);display:flex;align-items:center;justify-content:center;z-index:999;padding:24px}
.ac{width:100%;max-width:360px;background:var(--s1);border:1px solid var(--brd);border-radius:20px;padding:44px 36px}
.al{text-align:center;margin-bottom:24px}
.al-ico{font-size:40px;margin-bottom:8px}
.al h1{font-size:26px;font-weight:900;color:var(--acc);letter-spacing:-1px}
.al p{color:var(--txt2);font-size:13px;margin-top:4px}
.afl{margin-bottom:12px}
.afl label{display:block;font-size:11px;font-weight:700;color:var(--txt2);margin-bottom:5px;text-transform:uppercase;letter-spacing:.5px}
.afl input{width:100%;background:var(--s3);border:1px solid var(--brd);border-radius:var(--r);padding:11px 14px;color:var(--txt);font-size:14px;outline:none;transition:border-color .2s}
.afl input:focus{border-color:var(--acc)}
.ap{width:100%;background:var(--acc);color:#fff;border-radius:var(--r);padding:12px;font-weight:800;font-size:15px;transition:all .2s;letter-spacing:.3px}
.ap:hover{background:var(--acc2)}
#ae{color:var(--red);font-size:12px;text-align:center;min-height:16px;margin-top:8px}

/* SIDEBAR */
#sb{width:var(--sw);background:var(--s1);border-right:1px solid var(--brd);display:flex;flex-direction:column;flex-shrink:0;overflow:hidden}
.sb-br{padding:15px;border-bottom:1px solid var(--brd);display:flex;align-items:center;gap:8px}
.sb-ico{font-size:20px}.sb-txt{font-weight:900;font-size:15px;letter-spacing:-0.5px}.sb-txt span{color:var(--acc)}
#br-sel{padding:8px;border-bottom:1px solid var(--brd);flex-shrink:0}
#br-sel select{width:100%;background:var(--s3);border:1px solid var(--brd);border-radius:8px;padding:7px 10px;color:var(--txt);font-size:12px;outline:none;cursor:pointer}
.sbn{flex:1;overflow-y:auto;padding:6px}
.ni{display:flex;align-items:center;gap:10px;padding:9px 12px;border-radius:8px;cursor:pointer;color:var(--txt2);font-weight:500;font-size:13px;transition:all .15s;margin-bottom:2px;width:100%;text-align:left}
.ni:hover{background:var(--s3);color:var(--txt)}.ni.on{background:var(--acc-d);color:var(--acc)}
.ni .ico{font-size:15px;width:20px;text-align:center}
.ns{font-size:10px;font-weight:700;color:var(--txt3);text-transform:uppercase;letter-spacing:.8px;padding:12px 12px 4px;margin-top:4px}
.sb-bot{padding:10px;border-top:1px solid var(--brd)}
.su{display:flex;align-items:center;gap:8px;padding:8px;border-radius:8px;background:var(--s3)}
.sav{width:30px;height:30px;border-radius:50%;background:var(--acc-d);border:2px solid var(--acc);display:flex;align-items:center;justify-content:center;font-weight:700;font-size:12px;color:var(--acc);flex-shrink:0}
.sui{flex:1;overflow:hidden}.sue{font-size:11px;font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}.sur{font-size:10px;color:var(--txt3)}
.lout{margin-top:8px;width:100%;background:none;border:1px solid var(--brd);color:var(--txt2);border-radius:8px;padding:7px;font-size:12px;font-family:var(--font);transition:all .15s}
.lout:hover{border-color:var(--red);color:var(--red)}

/* MAIN */
#main{flex:1;display:flex;flex-direction:column;overflow:hidden}
#pg-hdr{padding:14px 24px;border-bottom:1px solid var(--brd);display:flex;align-items:center;justify-content:space-between;flex-shrink:0;gap:10px}
#pg-ttl{font-size:19px;font-weight:800;letter-spacing:-0.5px;flex-shrink:0}
#pg-acts{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
.hdr-export-btn{display:flex;align-items:center;gap:6px;background:var(--s3);border:1px solid var(--brd);color:var(--txt2);border-radius:8px;padding:7px 14px;font-size:12px;font-weight:700;transition:all .15s;}
.hdr-export-btn:hover{border-color:var(--acc);color:var(--acc)}
.hdr-export-btn.pdf{border-color:var(--red);color:var(--red);background:var(--red-d)}
.hdr-export-btn.email{border-color:var(--grn);color:var(--grn);background:var(--grn-d)}
.bs-acc{background:var(--acc);border:1px solid var(--acc);color:#fff;border-radius:8px;padding:7px 14px;font-size:12px;font-weight:700;font-family:var(--font)}
.bs-acc:hover{background:var(--acc2)}
#pg-c{flex:1;overflow-y:auto;padding:20px 24px}

/* KPI */
.kg{display:grid;grid-template-columns:repeat(auto-fill,minmax(195px,1fr));gap:12px;margin-bottom:20px}
.kc{background:var(--s2);border:1px solid var(--brd);border-radius:var(--r2);padding:16px;position:relative;overflow:hidden}
.kc::before{content:'';position:absolute;top:0;left:0;right:0;height:3px}
.kc.or::before{background:var(--acc)}.kc.gr::before{background:var(--grn)}.kc.bl::before{background:var(--blu)}.kc.pu::before{background:var(--pur)}
.kl{font-size:11px;font-weight:600;color:var(--txt2);text-transform:uppercase;letter-spacing:.5px;margin-bottom:8px}
.kv{font-family:var(--mono);font-size:20px;font-weight:700;margin-bottom:4px}
.ks{font-size:11px;color:var(--txt3)}.ki{position:absolute;right:12px;top:12px;font-size:22px;opacity:.18}
.cr{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:18px}
.cc{background:var(--s2);border:1px solid var(--brd);border-radius:var(--r2);padding:16px}
.ct{font-size:11px;font-weight:700;color:var(--txt2);margin-bottom:12px;text-transform:uppercase;letter-spacing:.5px}
.bc{display:flex;flex-direction:column;gap:6px}
.bi{display:flex;align-items:center;gap:8px}
.blab{width:108px;color:var(--txt2);font-size:11px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.btr{flex:1;height:17px;background:var(--s4);border-radius:4px;overflow:hidden}
.bf{height:100%;border-radius:4px;transition:width .65s cubic-bezier(.4,0,.2,1)}
.bval{width:68px;text-align:right;font-family:var(--mono);font-size:11px;color:var(--txt2)}
.dw{display:flex;align-items:center;gap:14px}
.dl{display:flex;flex-direction:column;gap:7px}
.dli{display:flex;align-items:center;gap:6px;font-size:11px}
.dld{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.stl{font-size:13px;font-weight:700;margin-bottom:12px;display:flex;align-items:center;gap:8px;color:var(--txt)}
.stl::after{content:'';flex:1;height:1px;background:var(--brd)}
.df{display:flex;gap:8px;align-items:center;margin-bottom:16px;flex-wrap:wrap}
.df label{font-size:12px;color:var(--txt2);font-weight:600}
.df input{background:var(--s3);border:1px solid var(--brd);border-radius:8px;padding:6px 10px;color:var(--txt);font-size:12px;outline:none;transition:border-color .2s}
.df input:focus{border-color:var(--acc)}
.df-btn{background:var(--acc-d);border:1px solid var(--acc);color:var(--acc);border-radius:8px;padding:6px 14px;cursor:pointer;font-size:12px;font-weight:700;font-family:var(--font)}

/* TABLE */
.dt{width:100%;border-collapse:collapse;font-size:13px}
.dt th{text-align:left;padding:10px 12px;font-size:11px;font-weight:700;color:var(--txt3);text-transform:uppercase;letter-spacing:.5px;border-bottom:1px solid var(--brd)}
.dt td{padding:10px 12px;border-bottom:1px solid var(--brd2)}
.dt tr:hover td{background:var(--s3)}.dt tr:last-child td{border-bottom:none}
.bdg{display:inline-block;padding:2px 7px;border-radius:4px;font-size:10px;font-weight:700;text-transform:uppercase}
.badm{background:var(--acc-d);color:var(--acc)}.bcsh{background:var(--blu-d);color:var(--blu)}
.bact{background:var(--grn-d);color:var(--grn)}.bins{background:var(--red-d);color:var(--red)}

/* FORMS */
.fg{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.ff{display:flex;flex-direction:column;gap:5px}.ff.full{grid-column:1/-1}
.ff label{font-size:11px;font-weight:700;color:var(--txt2);text-transform:uppercase;letter-spacing:.5px}
.ff input,.ff select,.ff textarea{background:var(--s3);border:1px solid var(--brd);border-radius:var(--r);padding:9px 12px;color:var(--txt);font-size:13px;outline:none;transition:border-color .2s}
.ff input:focus,.ff select:focus,.ff textarea:focus{border-color:var(--acc)}
.ff textarea{resize:vertical;min-height:70px}
.fa{display:flex;gap:8px;margin-top:16px}
.fcn{background:none;border:1px solid var(--brd);color:var(--txt2);border-radius:var(--r);padding:8px 18px;cursor:pointer;font-family:var(--font);font-size:13px;font-weight:600}
.fsv{background:var(--acc);border:none;color:#fff;border-radius:var(--r);padding:8px 22px;cursor:pointer;font-family:var(--font);font-size:13px;font-weight:700}
.fsv:hover{background:var(--acc2)}

/* IMAGE UPLOAD */
.iua{border:2px dashed var(--brd);border-radius:var(--r);padding:18px;text-align:center;cursor:pointer;transition:border-color .2s;position:relative}
.iua:hover{border-color:var(--acc)}
.iua img{max-height:90px;max-width:100%;border-radius:6px;margin-bottom:8px}
.iua p{font-size:12px;color:var(--txt3)}
.iua input[type=file]{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%}
.upb{height:3px;background:var(--s4);border-radius:2px;margin-top:6px;overflow:hidden}
.upbf{height:100%;background:var(--acc);width:0;transition:width .3s}
.compress-info{font-size:10px;color:var(--grn);margin-top:4px;min-height:14px}

/* TOGGLE SWITCH */
.tog-wrap{display:flex;align-items:center;gap:8px}
.tog{position:relative;width:40px;height:22px;flex-shrink:0}
.tog input{opacity:0;width:0;height:0;position:absolute}
.tog-sl{position:absolute;inset:0;background:var(--s4);border-radius:11px;cursor:pointer;transition:.25s;border:1px solid var(--brd)}
.tog-sl::before{content:'';position:absolute;width:16px;height:16px;border-radius:50%;background:var(--txt3);left:2px;top:2px;transition:.25s}
.tog input:checked + .tog-sl{background:var(--grn);border-color:var(--grn)}
.tog input:checked + .tog-sl::before{transform:translateX(18px);background:#fff}
.tog-lbl{font-size:12px;color:var(--txt2);font-weight:600}

/* CARD */
.cvd{background:var(--s2);border:1px solid var(--brd);border-radius:var(--r2);padding:18px;margin-bottom:14px}

/* MODAL */
#mo{position:fixed;inset:0;background:rgba(0,0,0,.72);z-index:500;display:none;align-items:center;justify-content:center;padding:16px}
#mo.open{display:flex}
.mod{background:var(--s1);border:1px solid var(--brd);border-radius:var(--r2);padding:24px;width:540px;max-width:100%;max-height:90vh;overflow-y:auto;position:relative}
.mod h3{font-size:16px;font-weight:800;margin-bottom:18px}
.mclose{position:absolute;top:14px;right:14px;background:none;border:none;color:var(--txt2);font-size:19px;cursor:pointer}

/* EMAIL MODAL */
#email-mo{position:fixed;inset:0;background:rgba(0,0,0,.72);z-index:600;display:none;align-items:center;justify-content:center;padding:16px}
#email-mo.open{display:flex}
.email-card{background:var(--s1);border:1px solid var(--grn);border-radius:var(--r2);padding:24px;width:400px;max-width:100%}
.email-card h3{font-size:16px;font-weight:800;margin-bottom:4px;color:var(--grn)}
.email-card p{font-size:12px;color:var(--txt2);margin-bottom:16px}
.email-inp{width:100%;background:var(--s3);border:1.5px solid var(--brd);border-radius:var(--r);padding:11px 14px;color:var(--txt);font-size:14px;outline:none;transition:border-color .2s;margin-bottom:12px}
.email-inp:focus{border-color:var(--grn)}
.email-send{width:100%;background:var(--grn);color:#000;border-radius:var(--r);padding:12px;font-weight:800;font-size:14px;margin-bottom:8px}
.email-cancel{width:100%;background:none;border:1px solid var(--brd);color:var(--txt2);border-radius:var(--r);padding:10px;font-size:13px;font-weight:600;font-family:var(--font)}

/* TOAST */
#toast{position:fixed;bottom:20px;right:20px;background:var(--s1);border:1px solid var(--brd);border-radius:10px;padding:11px 18px;font-size:13px;font-weight:500;z-index:9999;transform:translateY(60px);opacity:0;transition:all .28s;box-shadow:var(--sh)}
#toast.show{transform:translateY(0);opacity:1}
#toast.ok{border-color:var(--grn);color:var(--grn)}#toast.err{border-color:var(--red);color:var(--red)}#toast.inf{border-color:var(--blu);color:var(--blu)}
.spin{width:22px;height:22px;border:3px solid var(--brd);border-top-color:var(--acc);border-radius:50%;animation:sp .7s linear infinite}
@keyframes sp{to{transform:rotate(360deg)}}
.ldr{display:flex;align-items:center;justify-content:center;gap:12px;padding:36px;color:var(--txt2)}
</style>
</head>

<script type="module">
// ══════════════════════════════════════════════════════
//  IMPORT CONFIG
// ══════════════════════════════════════════════════════
import {
  FIREBASE_CONFIG, SUPER_ADMIN_EMAIL,
  CLOUDINARY_CLOUD_NAME, CLOUDINARY_UPLOAD_PRESET,
  EMAILJS_CONFIG, APP_NAME, APP_LOGO_EMOJI, DEFAULT_VAT
} from './config.js';

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
import { getAuth, signInWithEmailAndPassword, signOut, onAuthStateChanged }
  from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
import { getFirestore, collection, doc, getDocs, getDoc,
  addDoc, setDoc, updateDoc, deleteDoc, query, orderBy,
  serverTimestamp, limit }
  from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

const fbApp = initializeApp(FIREBASE_CONFIG);
const auth  = getAuth(fbApp);
const db    = getFirestore(fbApp);

// Branding
document.getElementById("auth-ico").textContent   = APP_LOGO_EMOJI;
document.getElementById("auth-title").textContent  = APP_NAME + " Admin";
document.getElementById("sb-ico").textContent     = APP_LOGO_EMOJI;
document.getElementById("sb-name").innerHTML      = `${APP_LOGO_EMOJI} <span>${APP_NAME}</span>`;
document.title = APP_NAME + " — Admin";

// ══════════════════════════════════════════════════════
//  IMAGE COMPRESSION (Canvas client-side)
// ══════════════════════════════════════════════════════
function compressImage(file, maxWidth = 800, quality = 0.82, outputType = "image/webp") {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onerror = () => reject(new Error("Không đọc được file ảnh"));
    reader.onload  = e => {
      const img = new Image();
      img.onerror = () => reject(new Error("File không phải ảnh hợp lệ"));
      img.onload  = () => {
        let { width, height } = img;
        if (width > maxWidth) { height = Math.round(height * maxWidth / width); width = maxWidth; }
        const canvas = document.createElement("canvas");
        canvas.width = width; canvas.height = height;
        const ctx = canvas.getContext("2d");
        ctx.fillStyle = "#ffffff"; ctx.fillRect(0, 0, width, height);
        ctx.drawImage(img, 0, 0, width, height);
        canvas.toBlob(blob => {
          if (!blob) {
            canvas.toBlob(jb => jb ? resolve(jb) : reject(new Error("toBlob thất bại")), "image/jpeg", quality);
            return;
          }
          resolve(blob);
        }, outputType, quality);
      };
      img.src = e.target.result;
    };
    reader.readAsDataURL(file);
  });
}

async function uploadToCloudinary(file, onProgress) {
  onProgress(10);
  let compressedBlob;
  try {
    compressedBlob = await compressImage(file);
    const oKB = Math.round(file.size / 1024), cKB = Math.round(compressedBlob.size / 1024);
    const inf = document.getElementById("compress-info");
    if (inf) inf.textContent = `✓ Nén: ${oKB}KB → ${cKB}KB`;
    console.log(`📸 Nén ảnh: ${oKB}KB → ${cKB}KB`);
  } catch (err) { console.warn("Compress fallback:", err); compressedBlob = file; }
  onProgress(30);
  const fd = new FormData();
  fd.append("file", compressedBlob, file.name.replace(/\.[^.]+$/, ".webp"));
  fd.append("upload_preset", CLOUDINARY_UPLOAD_PRESET);
  fd.append("folder", "menu_items");
  onProgress(60);
  const res  = await fetch(`https://api.cloudinary.com/v1_1/${CLOUDINARY_CLOUD_NAME}/image/upload`, { method:"POST", body:fd });
  onProgress(90);
  if (!res.ok) throw new Error(`Cloudinary HTTP ${res.status}`);
  const data = await res.json();
  if (!data.secure_url) throw new Error(data.error?.message || "Không có URL trả về");
  onProgress(100);
  return data.secure_url;
}

async function loadBranches(u) {
  try {
    const snap = await getDocs(collection(db, "Branches"));
    allBranches = snap.docs.map(d => ({ id: d.id, ...d.data() }));
    const sel = document.getElementById("brs");
    sel.innerHTML = "";

    if (isSA) {
      myRole = "admin";
      document.getElementById("sur").textContent = "Super Admin";
      // Super Admin thấy tùy chọn "Tất cả chi nhánh" ở đầu
      sel.innerHTML = `<option value="__ALL__">🌐 Tất cả chi nhánh</option>` +
        allBranches.map(b => `<option value="${b.id}">${b.info?.name || b.id}</option>`).join("");
    } else {
      const myB = [];
      for (const b of allBranches) {
        const sd = await getDoc(doc(db, "Branches", b.id, "Staff", u.email));
        if (sd.exists()) myB.push({ ...b, role: sd.data().role });
      }
      if (!myB.length) { showT("Chưa được phân công chi nhánh", "err"); signOut(auth); return; }
      sel.innerHTML = myB.map(b =>
        `<option value="${b.id}" data-role="${b.role}">${b.info?.name || b.id}</option>`
      ).join("");
      myRole = myB[0].role;
    }
    document.getElementById("sur").textContent = isSA ? "Super Admin" : (myRole === "admin" ? "Branch Admin" : "Thu Ngân");
    if (sel.options.length) { sel.selectedIndex = 0; onBrCh(); }
  } catch (e) {
    showT("Lỗi tải chi nhánh: " + e.message, "err"); console.error("loadBranches:", e);
  }
}

window.onBrCh = () => {
  const sel = document.getElementById("brs");
  const opt = sel.options[sel.selectedIndex];
  curBrId   = opt.value; // "__ALL__" nếu Super Admin chọn tổng quan
  curBrName = curBrId === "__ALL__" ? "Tất cả chi nhánh" : opt.text;
  if (!isSA && opt.dataset.role) myRole = opt.dataset.role;
  document.getElementById("sur").textContent =
    isSA ? "Super Admin" : (myRole === "admin" ? "Branch Admin" : "Thu Ngân");
  if (curBrId) goP(curPage);
};

//  DASHBOARD
//  Super Admin + "__ALL__": Cộng dồn TẤT CẢ chi nhánh
//  Branch Admin / cụ thể 1 branch: chỉ branch đó
// ══════════════════════════════════════════════════════
async function rDash() {
  const today = new Date(); today.setHours(0,0,0,0);
  const from  = new Date(today); from.setDate(today.getDate()-30);

  // Xác định danh sách branch cần query
  let branchesToQuery = [];
  if (isSA && curBrId === "__ALL__") {
    // Tổng quan toàn hệ thống
    branchesToQuery = allBranches.map(b => b.id);
  } else {
    branchesToQuery = [curBrId];
  }

  // Fetch orders từ tất cả branch cần query (client-side aggregation)
  allOrders = [];
  for (const bId of branchesToQuery) {
    const oSnap = await getDocs(query(
      collection(db, "Branches", bId, "Orders"),
      orderBy("createdAt","desc"), limit(500)
    ));
    oSnap.docs.forEach(d => allOrders.push({ id:d.id, branchId:bId, ...d.data() }));
  }

  // Tính toán KPI
  const done    = allOrders.filter(o => ["completed","paid","delivered"].includes(o.status));
  const todayO  = done.filter(o => { const d = o.createdAt?.toDate?.(); return d && d >= today; });
  const totR    = done.reduce((s,o) => s+(o.total||0), 0);
  const totV    = done.reduce((s,o) => s+(o.vat||0), 0);
  const netR    = totR - totV;
  const totD    = done.reduce((s,o) => s+(o.discount||0), 0);
  const gP      = netR - totD;
  const todayR  = todayO.reduce((s,o) => s+(o.total||0), 0);

  // Best sellers
  const iC = {}; done.forEach(o => (o.items||[]).forEach(i => { iC[i.name]=(iC[i.name]||0)+i.qty; }));
  const bs  = Object.entries(iC).sort((a,b) => b[1]-a[1]).slice(0,5);
  const mx  = bs[0]?.[1] || 1;

  // Payment methods
  const pmd = {cash:0,card:0,transfer:0};
  done.forEach(o => { if (o.paymentMethod in pmd) pmd[o.paymentMethod]+=(o.total||0); });
  const pmt = Object.values(pmd).reduce((s,v) => s+v,0) || 1;

  // Channels
  const chd = {dinein:0,takeaway:0,weborder:0,apporder:0};
  done.forEach(o => { if (o.orderType in chd) chd[o.orderType]++; });
  const cht = Object.values(chd).reduce((s,v) => s+v,0) || 1;

  const isAllMode = isSA && curBrId === "__ALL__";
  const scopeLabel = isAllMode ? "Toàn hệ thống" : curBrName;

  document.getElementById("pg-c").innerHTML = `
  <div id="dash-content">
    ${isAllMode ? `<div style="background:var(--acc-d);border:1px solid var(--acc);border-radius:var(--r);padding:8px 14px;margin-bottom:16px;font-size:12px;color:var(--acc);font-weight:700;">
      🌐 Đang xem tổng quan toàn hệ thống (${allBranches.length} chi nhánh · ${allOrders.length} đơn)
    </div>` : ""}
    <div class="df">
      <label>Từ:</label><input type="date" id="df-from" value="${fD(from)}"/>
      <label>Đến:</label><input type="date" id="df-to" value="${fD(today)}"/>
      <button class="df-btn" onclick="applyDateFilter()">Lọc</button>
      <span style="font-size:11px;color:var(--txt3)">${done.length} đơn hoàn thành (30 ngày) · ${scopeLabel}</span>
    </div>
    <div class="kg">
      <div class="kc or"><div class="ki">💰</div><div class="kl">Doanh thu tổng</div><div class="kv" style="color:var(--acc)">${fmt(totR)}</div><div class="ks">Hôm nay: ${fmt(todayR)}</div></div>
      <div class="kc gr"><div class="ki">✅</div><div class="kl">Doanh thu thuần</div><div class="kv" style="color:var(--grn)">${fmt(netR)}</div><div class="ks">Sau VAT: ${fmt(totV)}</div></div>
      <div class="kc bl"><div class="ki">📈</div><div class="kl">Lợi nhuận gộp</div><div class="kv" style="color:var(--blu)">${fmt(gP)}</div><div class="ks">Giảm giá: ${fmt(totD)}</div></div>
      <div class="kc pu"><div class="ki">🧾</div><div class="kl">Tổng đơn hàng</div><div class="kv" style="color:var(--pur)">${allOrders.length}</div><div class="ks">Hôm nay: ${todayO.length} đơn</div></div>
    </div>
    <div class="cr">
      <div class="cc">
        <div class="ct">🔥 Món bán chạy nhất (Top 5)</div>
        <div class="bc">${bs.length
          ? bs.map(([n,q]) => `<div class="bi"><div class="blab">${n}</div><div class="btr"><div class="bf" style="width:${(q/mx*100).toFixed(1)}%;background:var(--acc)"></div></div><div class="bval">${q} suất</div></div>`).join("")
          : '<div style="color:var(--txt3);font-size:12px;padding:8px 0">Chưa có dữ liệu</div>'}</div>
      </div>
      <div class="cc">
        <div class="ct">💳 Hình thức thanh toán</div>
        <div class="dw">
          ${donut([{l:"Tiền mặt",v:pmd.cash/pmt,c:"#00d97e"},{l:"Thẻ",v:pmd.card/pmt,c:"#4f9cff"},{l:"CK",v:pmd.transfer/pmt,c:"#b06fff"}])}
          <div class="dl">
            ${[["cash","💵 Tiền mặt","#00d97e"],["card","💳 Thẻ","#4f9cff"],["transfer","🏦 CK","#b06fff"]]
              .map(([k,l,c]) => `<div class="dli"><div class="dld" style="background:${c}"></div><span style="color:var(--txt2)">${l}:</span><strong>${fmt(pmd[k])}</strong></div>`).join("")}
          </div>
        </div>
      </div>
    </div>
    <div class="stl">Kênh bán hàng</div>
    <div class="cvd">
      <div class="bc">${Object.entries({dinein:"🪑 Tại chỗ",takeaway:"🥡 Mang về",weborder:"🌐 Web",apporder:"📱 App"})
        .map(([k,l]) => `<div class="bi"><div class="blab">${l}</div><div class="btr"><div class="bf" style="width:${(chd[k]/cht*100).toFixed(1)}%;background:var(--blu)"></div></div><div class="bval">${chd[k]} đơn</div></div>`).join("")}</div>
    </div>
  </div>`;
  addExportButtons(`Dashboard-${scopeLabel}`, "dash-content");
}

window.applyDateFilter = () => {
  const from     = new Date(document.getElementById("df-from").value);
  const to       = new Date(document.getElementById("df-to").value); to.setHours(23,59,59);
  const filtered = allOrders.filter(o => { const d = o.createdAt?.toDate?.(); return d && d >= from && d <= to; });
  showT(`Lọc: ${filtered.length} đơn trong khoảng đã chọn`, "inf");
};

      <td style="font-family:var(--mono);font-weight:700;color:var(--acc)">${fmt(o.total)}</td>
      <td><span class="bdg" style="background:${SC[s]}18;color:${SC[s]}">${SL[s]||s}</span></td>
      <td><select style="background:var(--s3);border:1px solid var(--brd);border-radius:6px;padding:4px;color:var(--txt);font-size:11px;font-family:var(--font)" onchange="updSt('${o.id}',this.value)">
        ${SF.map(st=>`<option value="${st}" ${st===s?"selected":""}>${SL[st]}</option>`).join("")}
      </select></td>
    </tr>`;
  }).join("");
  document.getElementById("pg-c").innerHTML = `

    <div class="cvd" style="overflow-x:auto">
      <table class="dt">
        <thead><tr><th>Mã</th><th>Thời gian</th><th>Kênh</th><th>Tổng</th><th>Trạng thái</th><th>Cập nhật</th></tr></thead>
        <tbody>${rows||'<tr><td colspan="6" style="text-align:center;color:var(--txt3);padding:24px">Chưa có đơn</td></tr>'}</tbody>
      </table>
    </div>
  </div>`;

}

// ══════════════════════════════════════════════════════
//  MENU (Branch view) — Hiển thị GlobalMenu + MenuStatus của branch
//  Branch Admin: Bật/Tắt available và sửa stock
//  KHÔNG có nút thêm/xóa/sửa thông tin gốc (chỉ SuperAdmin làm ở GlobalMenu)
// ══════════════════════════════════════════════════════
async function rMenu() {
  // Fetch GlobalMenu và MenuStatus đồng thời
  const [globalSnap, statusSnap] = await Promise.all([
    getDocs(collection(db, "GlobalMenu")),
    getDocs(collection(db, "Branches", curBrId, "MenuStatus"))
  ]);

  const globalItems  = globalSnap.docs.map(d => ({ id: d.id, ...d.data() }));
  const statusMap    = {};
  statusSnap.docs.forEach(d => { statusMap[d.id] = d.data(); });

  // Merge: kết hợp thông tin gốc với trạng thái cục bộ
  const merged = globalItems.map(g => {
    const st = statusMap[g.id] || { available: true, stock: -1 };
    return { ...g, available: st.available !== false, stock: st.stock ?? -1 };
  });

  // Tính tổng tồn kho toàn hệ thống (nếu là Super Admin)
  // Hiển thị nút cập nhật cho Branch Admin
  const canEdit = myRole === "admin"; // Branch Admin hoặc Super Admin
  const rows = merged.map(m => {
    const isOOS = !m.available || m.stock === 0;
    return `<tr>
      <td><img src="${m.image||"https://placehold.co/36x36/1a2232/3d4f70?text=🥗"}" style="width:36px;height:36px;border-radius:6px;object-fit:cover"/></td>
      <td><strong>${m.name}</strong><div style="font-size:11px;color:var(--txt3)">${m.category||"—"}</div></td>
      <td style="font-family:var(--mono);color:var(--acc);font-weight:700">${fmt(m.price)}</td>
      <td>
        ${canEdit
          ? `<label class="tog-wrap">
              <label class="tog">
                <input type="checkbox" ${m.available?"checked":""} onchange="toggleAvailable('${m.id}',this.checked)"/>
                <span class="tog-sl"></span>
              </label>
              <span class="tog-lbl">${m.available?"Đang bán":"Đã tắt"}</span>
            </label>`
          : `<span class="bdg ${m.available?"bact":"bins"}">${m.available?"Đang bán":"Đã tắt"}</span>`
        }
      </td>
      <td>
        <div style="display:flex;align-items:center;gap:6px">
          <span style="font-family:var(--mono);font-weight:700;color:${isOOS?"var(--red)":"var(--txt)"}">${m.stock>=0?m.stock:"∞"}</span>
          ${canEdit
            ? `<button style="background:var(--s3);border:1px solid var(--brd);color:var(--txt2);border-radius:6px;padding:3px 8px;font-size:11px;cursor:pointer"
                onclick="updStk('${m.id}','${m.name}',${m.stock})">Sửa</button>`
            : ""}
        </div>
      </td>
      <td><span class="bdg ${isOOS?"bins":"bact"}">${isOOS?"Hết / Tắt":"Có thể bán"}</span></td>
    </tr>`;
  }).join("");

  document.getElementById("pg-c").innerHTML = `
  <div id="menu-content">
    <div style="background:var(--blu-d);border:1px solid var(--blu);border-radius:var(--r);padding:10px 14px;margin-bottom:14px;font-size:12px;color:var(--blu);">

// ══════════════════════════════════════════════════════
//  GLOBAL MENU (HQ Catalog) — CHỈ Super Admin
//  Thêm/Sửa/Xóa thông tin gốc: tên, giá, ảnh, category
//  Cột "Tồn kho tổng" = cộng dồn stock từ tất cả MenuStatus
// ══════════════════════════════════════════════════════
async function rGlobalMenu() {
  if (!isSA) {
    document.getElementById("pg-c").innerHTML =
      '<div class="ldr" style="color:var(--red)">Chỉ Super Admin mới truy cập Kho HQ</div>';
    return;
  }
  document.getElementById("pg-acts").innerHTML =
    `<button class="bs-acc" onclick="openAddGItem()">+ Thêm món vào HQ</button>`;

  // Fetch GlobalMenu
  const globalSnap = await getDocs(collection(db, "GlobalMenu"));
  const globalItems = globalSnap.docs.map(d => ({ id: d.id, ...d.data() }));

  // Cộng dồn tồn kho từ tất cả chi nhánh
  // Fetch MenuStatus của từng branch song song để tăng hiệu suất
  const stockMap = {}; // itemId -> totalStock
  globalItems.forEach(g => { stockMap[g.id] = 0; });

  const branchStatusPromises = allBranches.map(b =>
    getDocs(collection(db, "Branches", b.id, "MenuStatus"))
  );
  const allStatusSnaps = await Promise.all(branchStatusPromises);
  allStatusSnaps.forEach(snap => {
    snap.docs.forEach(d => {
      if (stockMap[d.id] !== undefined) {
        const s = d.data().stock ?? -1;
        if (s < 0) {
          // Nếu bất kỳ chi nhánh nào có stock vô hạn → hiển thị ∞
          stockMap[d.id] = -1;
        } else if (stockMap[d.id] >= 0) {
          stockMap[d.id] += s;
        }
      }
    });
  });

  const rows = globalItems.map(g => `<tr>
    <td><img src="${g.image||"https://placehold.co/36x36/1a2232/3d4f70?text=🥗"}" style="width:36px;height:36px;border-radius:6px;object-fit:cover"/></td>
    <td><strong>${g.name}</strong></td>
    <td style="color:var(--txt2)">${g.category||"—"}</td>
    <td style="font-family:var(--mono);color:var(--acc);font-weight:700">${fmt(g.price)}</td>
    <td style="font-family:var(--mono);font-weight:700">
      ${stockMap[g.id] < 0 ? "∞" : stockMap[g.id]}
      <span style="font-size:10px;color:var(--txt3);margin-left:4px">(tổng ${allBranches.length} CN)</span>
    </td>
    <td>
      <button style="background:var(--s3);border:1px solid var(--brd);border-radius:6px;padding:4px 8px;cursor:pointer;font-size:12px"
        onclick="openEditGItem('${g.id}')">✏️ Sửa</button>
      <button style="background:var(--red-d);border:1px solid var(--red);color:var(--red);border-radius:6px;padding:4px 8px;cursor:pointer;font-size:12px;margin-left:4px"
        onclick="delGItem('${g.id}','${g.name}')">🗑️ Xóa</button>
    </td>
  </tr>`).join("");

  document.getElementById("pg-c").innerHTML = `
  <div id="global-menu-content">
    <div style="background:var(--acc-d);border:1px solid var(--acc);border-radius:var(--r);padding:10px 14px;margin-bottom:14px;font-size:12px;color:var(--acc);">
      🏢 <strong>Kho Thực Đơn HQ</strong> — Đây là danh mục gốc. Thay đổi ở đây áp dụng ngay cho tất cả chi nhánh.
      Cột "Tồn kho tổng" được cộng dồn từ ${allBranches.length} chi nhánh.
    </div>
    <div class="cvd" style="overflow-x:auto">
      <table class="dt">
        <thead><tr><th>Ảnh</th><th>Tên món</th><th>Danh mục</th><th>Giá</th><th>Tồn kho tổng</th><th>Thao tác</th></tr></thead>
        <tbody>${rows||'<tr><td colspan="6" style="text-align:center;color:var(--txt3);padding:24px">Chưa có món nào trong GlobalMenu</td></tr>'}</tbody>
      </table>
    </div>
  </div>`;
  addExportButtons("KhoThucDon-HQ", "global-menu-content");
}

window.upImg = async input => {
  const file = input.files[0]; if (!file) return;
  const pb = document.getElementById("mi-pb");
  const pv = document.getElementById("mi-pv");
  const tx = document.getElementById("mi-tx");
  const ui = document.getElementById("mi-url");
  try {
    const url = await uploadToCloudinary(file, pct => { pb.style.width = pct + "%"; });
    ui.value = url; pv.src = url; pv.style.display = "block";

        <div class="ff"><label>Link Google Map</label><input name="map" value="${info.map||""}"/></div>
        <div class="ff"><label>Facebook</label><input name="facebook" value="${info.facebook||""}"/></div>
        <div class="ff"><label>TikTok</label><input name="tiktok" value="${info.tiktok||""}"/></div>
      </div>
      <div class="fa"><button type="submit" class="fsv">💾 Lưu cài đặt</button></div>
    </form>
  </div>`;
}
window.saveSet = async e => {
  e.preventDefault(); const f = e.target;
  const info = {name:f.name.value.trim(),address:f.address.value.trim(),phone:f.phone.value.trim(),email:f.email.value.trim(),vat:Number(f.vat.value),currency:f.currency.value,map:f.map.value.trim(),facebook:f.facebook.value.trim(),tiktok:f.tiktok.value.trim()};
  await updateDoc(doc(db,"Branches",curBrId),{info,updatedAt:serverTimestamp()});
  showT("Đã lưu cài đặt!","ok");
};

//  UTILS

function donut(sl) {
  const sz=96,cx=48,cy=48,r=34,sw=11; let cum=0;
  const paths = sl.map(s => {
    const a1=cum*Math.PI*2-Math.PI/2, a2=(cum+s.v)*Math.PI*2-Math.PI/2; cum+=s.v;
    if(s.v<=0) return "";
    const x1=cx+r*Math.cos(a1),y1=cy+r*Math.sin(a1),x2=cx+r*Math.cos(a2),y2=cy+r*Math.sin(a2);
    return `<path d="M${x1},${y1} A${r},${r} 0 ${s.v>.5?1:0} 1 ${x2},${y2}" fill="none" stroke="${s.c}" stroke-width="${sw}" stroke-linecap="round"/>`;
  }).join("");
  return `<svg width="${sz}" height="${sz}" viewBox="0 0 ${sz} ${sz}" style="flex-shrink:0">${paths}</svg>`;
}
function fmt(n) { return new Intl.NumberFormat("vi-VN",{style:"currency",currency:"VND"}).format(n||0); }
function fD(d) { return d instanceof Date ? d.toISOString().slice(0,10) : ""; }
let _t;
function showT(msg, type="inf") {
  const el = document.getElementById("toast"); el.textContent=msg; el.className="show "+type;
  clearTimeout(_t); _t=setTimeout(()=>el.className="",3200);
}
window.showT = showT;
