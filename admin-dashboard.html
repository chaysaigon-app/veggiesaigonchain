.sb-bot{padding:10px;border-top:1px solid var(--brd)}

.sui{flex:1;overflow:hidden}.sue{font-size:11px;font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}.sur{font-size:10px;color:var(--txt3)}

</style>

<script type="module">
// ═══════════════════════════════════════════════════════════════
//  admin-dashboard.html — Veggie Saigon Chain
//  Kiến trúc HQ-Branch:
//  • curBrId = "all" → Super Admin xem toàn hệ thống
//  • curBrId = "<id>" → Branch Admin / cụ thể 1 chi nhánh
//  ⚠️  TUYỆT ĐỐI không truyền "all" vào doc(db,"Branches","all")
//      Luôn dùng getBranchIds() để lấy list ID thật
// ═══════════════════════════════════════════════════════════════
import {
  FIREBASE_CONFIG, SUPER_ADMIN_EMAIL,
  CLOUDINARY_CLOUD_NAME, CLOUDINARY_UPLOAD_PRESET,
  EMAILJS_CONFIG, APP_NAME, APP_LOGO_EMOJI, DEFAULT_VAT
} from './config.js';

import { initializeApp }
  from 'https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js';
import { getAuth, signInWithEmailAndPassword, signOut, onAuthStateChanged }
  from 'https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js';
import {
  getFirestore, collection, doc,
  getDocs, getDoc, addDoc, setDoc, updateDoc, deleteDoc,
  query, orderBy, serverTimestamp, limit
} from 'https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js';

const fbApp = initializeApp(FIREBASE_CONFIG);
const auth  = getAuth(fbApp);
const db    = getFirestore(fbApp);

// Branding
document.getElementById('auth-ico').textContent   = APP_LOGO_EMOJI;
document.getElementById('auth-title').textContent  = APP_NAME + ' Admin';
document.getElementById('sb-ico').textContent     = APP_LOGO_EMOJI;
document.getElementById('sb-name').innerHTML      = APP_LOGO_EMOJI + ' <span>' + APP_NAME + '</span>';
document.title = APP_NAME + ' — Admin';

// ═══════════════════════════════════════════════════════════════
//  IMAGE COMPRESSION — Canvas client-side, nén trước Cloudinary
// ═══════════════════════════════════════════════════════════════
function compressImage(file, maxWidth = 800, quality = 0.82, outputType = 'image/webp') {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onerror = () => reject(new Error('Không đọc được file ảnh'));
    reader.onload  = ev => {
      const img = new Image();
      img.onerror = () => reject(new Error('File không phải ảnh hợp lệ'));
      img.onload  = () => {
        let { width, height } = img;
        if (width > maxWidth) { height = Math.round(height * maxWidth / width); width = maxWidth; }
        const canvas = document.createElement('canvas');
        canvas.width = width; canvas.height = height;
        const ctx = canvas.getContext('2d');
        ctx.fillStyle = '#ffffff'; ctx.fillRect(0, 0, width, height);
        ctx.drawImage(img, 0, 0, width, height);
        canvas.toBlob(blob => {
          if (!blob) { canvas.toBlob(jb => jb ? resolve(jb) : reject(new Error('toBlob failed')), 'image/jpeg', quality); return; }
          resolve(blob);
        }, outputType, quality);
      };
      img.src = ev.target.result;
    };
    reader.readAsDataURL(file);
  });
}

async function uploadToCloudinary(file, onProgress) {
  onProgress(10);
  let blob;
  try {
    blob = await compressImage(file);
    const oKB = Math.round(file.size / 1024), cKB = Math.round(blob.size / 1024);
    const inf  = document.getElementById('compress-info');
    if (inf) inf.textContent = `✓ Nén: ${oKB}KB → ${cKB}KB`;
  } catch(err) { console.warn('Compress fallback:', err); blob = file; }
  onProgress(30);
  const fd = new FormData();
  fd.append('file', blob, file.name.replace(/\.[^.]+$/, '.webp'));
  fd.append('upload_preset', CLOUDINARY_UPLOAD_PRESET);
  fd.append('folder', 'menu_items');
  onProgress(60);
  const res = await fetch(`https://api.cloudinary.com/v1_1/${CLOUDINARY_CLOUD_NAME}/image/upload`, { method: 'POST', body: fd });
  onProgress(90);
  if (!res.ok) throw new Error(`Cloudinary HTTP ${res.status}`);
  const data = await res.json();
  if (!data.secure_url) throw new Error(data.error?.message || 'Không có URL trả về');
  onProgress(100);
  return data.secure_url;
}

window.doLogin = async () => {

onAuthStateChanged(auth, async user => {

  document.getElementById('auth').style.display = 'none';

    emailjs.init(EMAILJS_CONFIG.publicKey);
  }
  await loadBranches(user);
});

async function loadBranches(user) {
  try {
    const snap = await getDocs(collection(db, 'Branches'));
    allBranches = snap.docs.map(d => ({ id: d.id, ...d.data() }));
    const sel   = document.getElementById('brs');
    sel.innerHTML = '';
    if (isSA) {
      myRole = 'admin';
      document.getElementById('sur').textContent = 'Super Admin';
      // value="all" — KHÔNG dùng "__ALL__", Firestore từ chối ID có __
      sel.innerHTML = '<option value="all">🌐 Tất cả chi nhánh</option>' +
        allBranches.map(b => `<option value="${b.id}">${b.info?.name || b.id}</option>`).join('');
    } else {
      const myB = [];
      for (const b of allBranches) {
        const sd = await getDoc(doc(db, 'Branches', b.id, 'Staff', user.email));
        if (sd.exists()) myB.push({ ...b, role: sd.data().role });
      }
      if (!myB.length) { showT('Chưa được phân công chi nhánh', 'err'); signOut(auth); return; }
      sel.innerHTML = myB.map(b =>
        `<option value="${b.id}" data-role="${b.role}">${b.info?.name || b.id}</option>`
      ).join('');
      myRole = myB[0].role;
    }
    document.getElementById('sur').textContent = isSA ? 'Super Admin' : (myRole === 'admin' ? 'Branch Admin' : 'Thu Ngân');
    if (sel.options.length) { sel.selectedIndex = 0; onBrCh(); }
  } catch(e) { showT('Lỗi tải chi nhánh: ' + e.message, 'err'); console.error(e); }
}

window.onBrCh = () => {
  const sel = document.getElementById('brs');
  const opt = sel.options[sel.selectedIndex];
  curBrId   = opt.value;   // 'all' hoặc branchId thật
  curBrName = curBrId === 'all' ? 'Tất cả chi nhánh' : opt.text;
  if (!isSA && opt.dataset.role) myRole = opt.dataset.role;
  document.getElementById('sur').textContent = isSA ? 'Super Admin' : (myRole === 'admin' ? 'Branch Admin' : 'Thu Ngân');
  if (curBrId) goP(curPage);
};

// ═══════════════════════════════════════════════════════════════
//  DASHBOARD
//  curBrId === 'all' → loop TẤT CẢ branch, cộng dồn orders
//  curBrId = ID thật → chỉ branch đó
// ═══════════════════════════════════════════════════════════════
async function rDash() {
  const today = new Date(); today.setHours(0,0,0,0);
  const from  = new Date(today); from.setDate(today.getDate() - 30);
  const brIds = getBranchIds();   // Không bao giờ chứa 'all'

  allOrders = [];
  for (const bId of brIds) {
    const oSnap = await getDocs(query(
      collection(db, 'Branches', bId, 'Orders'),
      orderBy('createdAt','desc'), limit(500)
    ));
    oSnap.docs.forEach(d => allOrders.push({ id:d.id, branchId:bId, ...d.data() }));
  }

  const done   = allOrders.filter(o => ['completed','paid','delivered'].includes(o.status));
  const todayO = done.filter(o => { const d = o.createdAt?.toDate?.(); return d && d >= today; });
  const totR   = done.reduce((s,o) => s+(o.total||0), 0);
  const totV   = done.reduce((s,o) => s+(o.vat||0), 0);
  const netR   = totR - totV;
  const totD   = done.reduce((s,o) => s+(o.discount||0), 0);
  const gP     = netR - totD;
  const todayR = todayO.reduce((s,o) => s+(o.total||0), 0);

  const iC = {};
  done.forEach(o => (o.items||[]).forEach(i => { iC[i.name] = (iC[i.name]||0) + i.qty; }));
  const bs = Object.entries(iC).sort((a,b) => b[1]-a[1]).slice(0,5);
  const mx = bs[0]?.[1] || 1;

  const pmd = { cash:0, card:0, transfer:0 };
  done.forEach(o => { if (o.paymentMethod in pmd) pmd[o.paymentMethod] += (o.total||0); });
  const pmt = Object.values(pmd).reduce((s,v) => s+v, 0) || 1;

  const chd = { dinein:0, takeaway:0, weborder:0, apporder:0 };
  done.forEach(o => { if (o.orderType in chd) chd[o.orderType]++; });
  const cht = Object.values(chd).reduce((s,v) => s+v, 0) || 1;

  const isAll  = curBrId === 'all';
  const scope  = isAll ? `Toàn hệ thống (${brIds.length} chi nhánh)` : curBrName;
  const banner = isAll
    ? `<div style="background:var(--acc-d);border:1px solid var(--acc);border-radius:var(--r);padding:8px 14px;margin-bottom:16px;font-size:12px;color:var(--acc);font-weight:700;">🌐 Đang xem tổng quan toàn hệ thống — ${brIds.length} chi nhánh · ${allOrders.length} đơn</div>`
    : '';

  const bsBars = bs.length
    ? bs.map(([n,q]) => `<div class="bi"><div class="blab">${n}</div><div class="btr"><div class="bf" style="width:${(q/mx*100).toFixed(1)}%;background:var(--acc)"></div></div><div class="bval">${q} suất</div></div>`).join('')
    : '<div style="color:var(--txt3);font-size:12px;padding:8px 0">Chưa có dữ liệu</div>';

  const pmRows = [['cash','💵 Tiền mặt','#00d97e'],['card','💳 Thẻ','#4f9cff'],['transfer','🏦 CK','#b06fff']]
    .map(([k,l,c]) => `<div class="dli"><div class="dld" style="background:${c}"></div><span style="color:var(--txt2)">${l}:</span><strong>${fmt(pmd[k])}</strong></div>`).join('');

  const chBars = Object.entries({dinein:'🪑 Tại chỗ',takeaway:'🥡 Mang về',weborder:'🌐 Web',apporder:'📱 App'})
    .map(([k,l]) => `<div class="bi"><div class="blab">${l}</div><div class="btr"><div class="bf" style="width:${(chd[k]/cht*100).toFixed(1)}%;background:var(--blu)"></div></div><div class="bval">${chd[k]} đơn</div></div>`).join('');

  document.getElementById('pg-c').innerHTML = `
  <div id="dash-content">
    ${banner}
    <div class="df">
      <label>Từ:</label><input type="date" id="df-from" value="${fD(from)}"/>
      <label>Đến:</label><input type="date" id="df-to" value="${fD(today)}"/>
      <button class="df-btn" onclick="applyDateFilter()">Lọc</button>
      <span style="font-size:11px;color:var(--txt3)">${done.length} đơn hoàn thành (30 ngày) · ${scope}</span>
    </div>
    <div class="kg">
      <div class="kc or"><div class="ki">💰</div><div class="kl">Doanh thu tổng</div><div class="kv" style="color:var(--acc)">${fmt(totR)}</div><div class="ks">Hôm nay: ${fmt(todayR)}</div></div>
      <div class="kc gr"><div class="ki">✅</div><div class="kl">Doanh thu thuần</div><div class="kv" style="color:var(--grn)">${fmt(netR)}</div><div class="ks">Sau VAT: ${fmt(totV)}</div></div>
      <div class="kc bl"><div class="ki">📈</div><div class="kl">Lợi nhuận gộp</div><div class="kv" style="color:var(--blu)">${fmt(gP)}</div><div class="ks">Giảm giá: ${fmt(totD)}</div></div>
      <div class="kc pu"><div class="ki">🧾</div><div class="kl">Tổng đơn hàng</div><div class="kv" style="color:var(--pur)">${allOrders.length}</div><div class="ks">Hôm nay: ${todayO.length} đơn</div></div>
    </div>
    <div class="cr">
      <div class="cc"><div class="ct">🔥 Món bán chạy nhất (Top 5)</div><div class="bc">${bsBars}</div></div>
      <div class="cc">
        <div class="ct">💳 Hình thức thanh toán</div>
        <div class="dw">
          ${donut([{v:pmd.cash/pmt,c:'#00d97e'},{v:pmd.card/pmt,c:'#4f9cff'},{v:pmd.transfer/pmt,c:'#b06fff'}])}
          <div class="dl">${pmRows}</div>
        </div>
      </div>
    </div>
    <div class="stl">Kênh bán hàng</div>
    <div class="cvd"><div class="bc">${chBars}</div></div>
  </div>`;
  addExportButtons('Dashboard-' + scope.replace(/[^a-zA-Z0-9]/g,'-'), 'dash-content');
}

window.applyDateFilter = () => {
  const from = new Date(document.getElementById('df-from').value);
  const to   = new Date(document.getElementById('df-to').value); to.setHours(23,59,59);
  const f    = allOrders.filter(o => { const d = o.createdAt?.toDate?.(); return d && d >= from && d <= to; });
  showT(`Lọc: ${f.length} đơn trong khoảng đã chọn`, 'inf');
};

async function rOrders() {
  if (curBrId === 'all') {
    document.getElementById('pg-c').innerHTML = `
    <div class="cvd" style="text-align:center;padding:40px;color:var(--txt2)">
      <div style="font-size:36px;margin-bottom:12px">🏢</div>
      <div style="font-size:15px;font-weight:700;margin-bottom:6px">Vui lòng chọn một chi nhánh cụ thể</div>
      <div style="font-size:13px">Tab Đơn hàng cần chọn chi nhánh để hiển thị và cập nhật trạng thái đơn.</div>
    </div>`;
    return;
  }
  const SL = {pending:'Chờ XN',paid:'Đã TT',preparing:'Chuẩn bị',delivering:'Giao hàng',delivered:'Đã giao',completed:'Hoàn thành',cancelled:'Đã hủy'};
  const SC = {pending:'var(--ylw)',paid:'var(--grn)',preparing:'var(--blu)',delivering:'var(--pur)',delivered:'#c8a7ff',completed:'#4dffa6',cancelled:'var(--red)'};
  const SF = ['pending','paid','preparing','delivering','delivered','completed','cancelled'];
  const snap   = await getDocs(query(collection(db,'Branches',curBrId,'Orders'), orderBy('createdAt','desc'), limit(100)));
  const orders = snap.docs.map(d => ({ id:d.id, ...d.data() }));
  const rows   = orders.map(o => {
    const ts = o.createdAt?.toDate?.(); const s = o.status || 'pending';
    const opts = SF.map(st => `<option value="${st}" ${st===s?'selected':''}>${SL[st]}</option>`).join('');
    const chIco = {dinein:'🪑',takeaway:'🥡',weborder:'🌐',apporder:'📱'}[o.orderType] || '';
    return `<tr>
      <td><span style="font-family:var(--mono);font-size:11px">#${o.id.slice(-6).toUpperCase()}</span></td>
      <td style="font-size:12px">${ts?ts.toLocaleString('vi-VN'):'—'}</td>
      <td>${chIco} ${o.orderType||'—'}</td>
      <td style="font-family:var(--mono);font-weight:700;color:var(--acc)">${fmt(o.total)}</td>
      <td><span class="bdg" style="background:${SC[s]}18;color:${SC[s]}">${SL[s]||s}</span></td>
      <td><select style="background:var(--s3);border:1px solid var(--brd);border-radius:6px;padding:4px;color:var(--txt);font-size:11px;font-family:var(--font)" onchange="updSt('${o.id}',this.value)">${opts}</select></td>
    </tr>`;
  }).join('');
  document.getElementById('pg-c').innerHTML = `
  <div id="orders-content"><div class="cvd" style="overflow-x:auto">
    <table class="dt"><thead><tr><th>Mã</th><th>Thời gian</th><th>Kênh</th><th>Tổng</th><th>Trạng thái</th><th>Cập nhật</th></tr></thead>
    <tbody>${rows||'<tr><td colspan="6" style="text-align:center;color:var(--txt3);padding:24px">Chưa có đơn</td></tr>'}</tbody></table>
  </div></div>`;
  addExportButtons(`DonHang-${curBrName}`, 'orders-content');
}

    showT('Đã cập nhật','ok');

};

// Chế độ HQ: Super Admin quản lý GlobalMenu
async function rMenuHQ() {
  // ★ BẮT BUỘC hiện nút "+ Thêm món" ở chế độ HQ
  // Thay thế đoạn cấu hình nút của rMenuHQ() cũ bằng đoạn này:
document.getElementById('pg-acts').innerHTML =
  `<button class="bs-acc" style="background:var(--grn);border-color:var(--grn);margin-right:8px" onclick="openBulkImportMo()">📥 Nhập JSON</button>` +
  `<button class="bs-acc" onclick="openAddGItem()">+ Thêm món vào HQ</button>`;

  const globalSnap  = await getDocs(collection(db, 'GlobalMenu'));
  const globalItems = globalSnap.docs.map(d => ({ id:d.id, ...d.data() }));

  // Cộng dồn stock từ TẤT CẢ chi nhánh song song
  const stockMap = {};
  globalItems.forEach(g => { stockMap[g.id] = 0; });
  const statusSnaps = await Promise.all(
    allBranches.map(b => getDocs(collection(db,'Branches',b.id,'MenuStatus')))
  );
  statusSnaps.forEach(snap => {
    snap.docs.forEach(d => {
      if (d.id in stockMap) {
        const s = d.data().stock ?? -1;
        if      (s < 0)           stockMap[d.id] = -1;
        else if (stockMap[d.id] >= 0) stockMap[d.id] += s;
      }
    });
  });

  const rows = globalItems.map(g => {
    const stk = stockMap[g.id] < 0 ? '∞' : stockMap[g.id];
    const img = g.image || 'https://placehold.co/36x36/1a2232/3d4f70?text=🥗';
    return `<tr>
      <td><img src="${img}" style="width:36px;height:36px;border-radius:6px;object-fit:cover"/></td>
      <td><strong>${g.name}</strong><div style="font-size:11px;color:var(--txt3)">${g.category||'—'}</div></td>
      <td style="font-family:var(--mono);color:var(--acc);font-weight:700">${fmt(g.price)}</td>
      <td style="font-family:var(--mono);font-weight:700">${stk} <span style="font-size:10px;color:var(--txt3)">(${allBranches.length} CN)</span></td>

// Chế độ Branch: toggle available + sửa stock cục bộ
async function rMenuBranch() {
  const [globalSnap, statusSnap] = await Promise.all([
    getDocs(collection(db,'GlobalMenu')),
    getDocs(collection(db,'Branches',curBrId,'MenuStatus'))
  ]);
  const globalItems = globalSnap.docs.map(d => ({ id:d.id, ...d.data() }));
  const statusMap   = {};
  statusSnap.docs.forEach(d => { statusMap[d.id] = d.data(); });

  const merged = globalItems.map(g => {
    const st = statusMap[g.id] || { available:true, stock:-1 };
    return { ...g, available: st.available !== false, stock: st.stock ?? -1 };
  });

  const canEdit = myRole === 'admin';
  const rows = merged.map(m => {
    const isOOS  = !m.available || m.stock === 0;
    const img    = m.image || 'https://placehold.co/36x36/1a2232/3d4f70?text=🥗';
    const stkDisp = m.stock >= 0 ? m.stock : '∞';
    const togHtml = canEdit
      ? `<label class="tog-wrap"><label class="tog"><input type="checkbox" ${m.available?'checked':''} onchange="toggleAvailable('${m.id}',this.checked)"/><span class="tog-sl"></span></label><span class="tog-lbl">${m.available?'Đang bán':'Đã tắt'}</span></label>`
      : `<span class="bdg ${m.available?'bact':'bins'}">${m.available?'Đang bán':'Đã tắt'}</span>`;
    const stkHtml = `<div style="display:flex;align-items:center;gap:6px">
      <span style="font-family:var(--mono);font-weight:700;color:${isOOS?'var(--red)':'var(--txt)'}">${stkDisp}</span>
      ${canEdit ? `<button style="background:var(--s3);border:1px solid var(--brd);color:var(--txt2);border-radius:6px;padding:3px 8px;font-size:11px;cursor:pointer" onclick="updStk('${m.id}','${m.name.replace(/'/g,"\\'")}',${m.stock})">Sửa</button>` : ''}
    </div>`;
    return `<tr>
      <td><img src="${img}" style="width:36px;height:36px;border-radius:6px;object-fit:cover"/></td>
      <td><strong>${m.name}</strong><div style="font-size:11px;color:var(--txt3)">${m.category||'—'}</div></td>
      <td style="font-family:var(--mono);color:var(--acc);font-weight:700">${fmt(m.price)}</td>
      <td>${togHtml}</td>
      <td>${stkHtml}</td>
      <td><span class="bdg ${isOOS?'bins':'bact'}">${isOOS?'Hết / Tắt':'Có thể bán'}</span></td>
    </tr>`;
  }).join('');

  document.getElementById('pg-c').innerHTML = `
  <div id="menu-branch-content">
    <div style="background:var(--blu-d);border:1px solid var(--blu);border-radius:var(--r);padding:10px 14px;margin-bottom:14px;font-size:12px;color:var(--blu);">
      ℹ️ <strong>Chi nhánh: ${curBrName}</strong> — Bật/Tắt và sửa tồn kho cục bộ. Để thêm/sửa/xóa thông tin gốc, chọn <em>"Tất cả chi nhánh"</em>.
    </div>
    <div class="cvd" style="overflow-x:auto">
      <table class="dt">
        <thead><tr><th>Ảnh</th><th>Tên món</th><th>Giá</th><th>Bật/Tắt</th><th>Tồn kho chi nhánh</th><th>Trạng thái</th></tr></thead>
        <tbody>${rows||'<tr><td colspan="6" style="text-align:center;color:var(--txt3);padding:24px">Chưa có món trong GlobalMenu</td></tr>'}</tbody>
      </table>
    </div>
  </div>`;
}

// Toggle available trong MenuStatus của branch cụ thể
window.toggleAvailable = async (itemId, isAvailable) => {
  if (curBrId === 'all') return;  // GUARD
  try {
    await setDoc(doc(db,'Branches',curBrId,'MenuStatus',itemId), {available:isAvailable}, {merge:true});
    showT(isAvailable ? '✅ Đã mở bán món' : '⛔ Đã tắt món', 'ok');
  } catch(e) { showT('Lỗi: '+e.message,'err'); console.error(e); }
};

// Sửa stock trong MenuStatus của branch cụ thể
window.updStk = async (itemId, name, cur) => {
  if (curBrId === 'all') return;  // GUARD
  const n = prompt(`Tồn kho mới cho "${name}" tại ${curBrName} (hiện: ${cur>=0?cur:'∞'}, nhập -1 = vô hạn):`);
  if (n === null) return;
  const nv = parseInt(n);
  if (isNaN(nv)) { showT('Số không hợp lệ','err'); return; }
  try {
    await setDoc(doc(db,'Branches',curBrId,'MenuStatus',itemId), {stock:nv}, {merge:true});
    showT(`Tồn kho "${name}" → ${nv>=0?nv:'∞'}`, 'ok');
    rMenuBranch();
  } catch(e) { showT('Lỗi: '+e.message,'err'); console.error(e); }
};

// _gImgUrl lưu URL ảnh sau khi upload, tránh phụ thuộc vào hidden input
let _gImgUrl = '';
window.openAddGItem = () => { _gImgUrl = ''; openMo('➕ Thêm món vào Kho HQ', gItemForm()); };
window.openEditGItem = async id => {
  const s = await getDoc(doc(db,'GlobalMenu',id));
  if (!s.exists()) return;
  const g = { id:s.id, ...s.data() };
  _gImgUrl = g.image || '';
  openMo('✏️ Sửa món HQ', gItemForm(g));
};

window.saveGItem = async id => {
  const name  = document.getElementById('gi-name')?.value.trim();
  const price = document.getElementById('gi-price')?.value;
  const cat   = document.getElementById('gi-cat')?.value.trim();
  const desc  = document.getElementById('gi-desc')?.value.trim();
  if (!name || !price) { showT('Vui lòng điền tên và giá','err'); return; }
  const data = {
    name, price: Number(price), category: cat, description: desc,
    image: _gImgUrl || null, updatedAt: serverTimestamp()
  };
  try {
    if (id) {
      await updateDoc(doc(db,'GlobalMenu',id), data);
      showT('✅ Đã cập nhật món HQ!','ok');
    } else {
      data.createdAt = serverTimestamp();
      await addDoc(collection(db,'GlobalMenu'), data);
      showT('✅ Đã thêm món vào HQ!','ok');
    }
    closeMo2(); rMenu();
  } catch(e) { showT('Lỗi: '+e.message,'err'); console.error(e); }
};

window.delGItem = async id => {
  const snap = await getDoc(doc(db,'GlobalMenu',id));
  const name = snap.exists() ? snap.data().name : id;
  if (!confirm(`Xóa món "${name}" khỏi HQ?\nMọi chi nhánh sẽ không thấy món này nữa.`)) return;
  try {
    await deleteDoc(doc(db,'GlobalMenu',id));
    showT('Đã xóa khỏi HQ','inf'); rMenu();
  } catch(e) { showT('Lỗi: '+e.message,'err'); console.error(e); }
};

window.upImg = async input => {
  const file = input.files[0]; if (!file) return;
  const pb = document.getElementById('mi-pb');
  const pv = document.getElementById('mi-pv');
  const tx = document.getElementById('mi-tx');
  try {
    const url = await uploadToCloudinary(file, pct => { pb.style.width = pct+'%'; });
    _gImgUrl = url; pv.src = url; pv.style.display = 'block';
    if (tx) tx.textContent = 'Nhấn để đổi'; showT('✅ Upload thành công!','ok');
  } catch(e) { showT('Lỗi upload: '+e.message,'err'); console.error(e); }
  setTimeout(() => pb.style.width = '0', 1200);
};

  }
  closeMo2(); rBranches(); loadBranches(me);
};
window.delBr = async id => {
  const snap = await getDoc(doc(db,'Branches',id));
  const name = snap.exists() ? (snap.data().info?.name || id) : id;
  if (!confirm(`Xóa chi nhánh "${name}"?\nToàn bộ dữ liệu sẽ mất!`)) return;
  await deleteDoc(doc(db,'Branches',id));
  showT('Đã xóa chi nhánh','inf'); rBranches();
};

      Các trường tuỳ chọn: <strong>description</strong> (Mô tả), <strong>category</strong> (Danh mục).
    </div>
    <textarea id="bulk-json-input" style="width:100%;height:220px;background:var(--s3);border:1px solid var(--brd);border-radius:var(--r);padding:12px;color:var(--txt);font-family:var(--mono);font-size:12px;resize:vertical" placeholder='${sampleJson}'></textarea>
    <div class="fa" style="margin-top:16px">
      <button type="button" class="fcn" onclick="closeMo2()">Huỷ</button>
      <button type="button" class="fsv" onclick="processBulkImport()">Tiến hành thêm</button>
    </div>
  `;
  openMo('📥 Nhập menu hàng loạt từ JSON', html);
};

window.processBulkImport = async () => {
  const rawText = document.getElementById('bulk-json-input').value.trim();
  if (!rawText) { showT('Vui lòng dán nội dung JSON', 'err'); return; }

  let dataArr;
  try {
    dataArr = JSON.parse(rawText);
    if (!Array.isArray(dataArr)) throw new Error('Dữ liệu JSON phải là một mảng (bắt đầu bằng [ và kết thúc bằng ])');
  } catch (e) {
    showT('JSON không hợp lệ: ' + e.message, 'err');
    return;
  }

  // Validate các item trong mảng
  const validItems = [];
  for (let i = 0; i < dataArr.length; i++) {
    const item = dataArr[i];
    if (!item.name || typeof item.price !== 'number') {
      showT(`Bỏ qua món thứ ${i+1}: Thiếu tên hoặc giá không phải là số`, 'err');
      continue;
    }
    
    // Chuẩn bị dữ liệu để đẩy lên Firestore
    validItems.push({
      name: String(item.name).trim(),
      price: Number(item.price),
      description: item.description ? String(item.description).trim() : '',
      category: item.category ? String(item.category).trim() : '',
      image: null,
      createdAt: serverTimestamp(),
      updatedAt: serverTimestamp()
    });
  }

  if (validItems.length === 0) {
    showT('Không có món nào hợp lệ để thêm!', 'err');
    return;
  }

  if (!confirm(`Bạn chuẩn bị thêm ${validItems.length} món vào hệ thống HQ. Bạn có chắc chắn không?`)) return;

  closeMo2();
  showT(`Đang thêm ${validItems.length} món...`, 'inf');

  try {
    // Chạy song song các lệnh thêm vào Firestore để tăng tốc độ
    await Promise.all(
      validItems.map(item => addDoc(collection(db, 'GlobalMenu'), item))
    );
    showT(`✅ Đã thêm thành công ${validItems.length} món!`, 'ok');
    rMenu(); // Cập nhật lại giao diện bảng menu
  } catch (e) {
    showT('Có lỗi xảy ra khi thêm: ' + e.message, 'err');
    console.error(e);
  }
};
  function donut(sl) {
  const sz=96,cx=48,cy=48,r=34,sw=11; let cum=0;
  const paths = sl.map(s => {
    const a1=cum*Math.PI*2-Math.PI/2, a2=(cum+s.v)*Math.PI*2-Math.PI/2; cum+=s.v;
    if (s.v<=0) return '';
    const x1=cx+r*Math.cos(a1),y1=cy+r*Math.sin(a1),x2=cx+r*Math.cos(a2),y2=cy+r*Math.sin(a2);
    return `<path d="M${x1},${y1} A${r},${r} 0 ${s.v>.5?1:0} 1 ${x2},${y2}" fill="none" stroke="${s.c}" stroke-width="${sw}" stroke-linecap="round"/>`;
  }).join('');
  return `<svg width="${sz}" height="${sz}" viewBox="0 0 ${sz} ${sz}" style="flex-shrink:0">${paths}</svg>`;
}
function fmt(n) { return new Intl.NumberFormat('vi-VN',{style:'currency',currency:'VND'}).format(n||0); }
function fD(d)  { return d instanceof Date ? d.toISOString().slice(0,10) : ''; }
let _t;
function showT(msg, type='inf') {
  const el = document.getElementById('toast');
  el.textContent = msg; el.className = 'show ' + type;
  clearTimeout(_t); _t = setTimeout(() => el.className='', 3200);
}
window.showT = showT;
